<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>roguelike</title>
    <style>
        body{
            display: flex;
        }
        canvas {
            margin: auto;
            border: 2px solid black;
        }
    </style>
</head>
<body>
    <canvas id="canvas1"></canvas>
    <script type="module">
        import { Renderer } from './js/Renderer.js';
        import { Player } from './js/Player.js';
        import { GameManager } from './js/GameManager.js';
        import { Camera       } from './js/Camera.js';
        import {RoomManager} from './js/Room.js';
        const canvas = document.getElementById("canvas1");
        canvas.width = innerWidth * 0.98;
        canvas.height = innerHeight * 0.96;
        
        const keys = [];
        const gameTimeManager = {
            lastTime: performance.now(),
            deltaTimeSeconds: 0,
        }
        
        const renderer = new Renderer(canvas);
        
        const gameManager = new GameManager(renderer, gameTimeManager);
        const roomManager = new RoomManager(gameTimeManager, canvas.width, canvas.height);
        const camera = new Camera();
        const player = new Player(300, 200, canvas.width * 0.2, gameTimeManager, keys, roomManager, 500);
        await renderer.loadAssets();

        window._debug = { player, roomManager, gameManager, camera };
        function gameLoop() {
            renderer.update(gameTimeManager.deltaTimeSeconds);
            
            renderer.clear();
            renderer.drawBackground(camera.x);

            gameManager.update(player, roomManager);
            renderer.applyCamera(camera.x);
            gameManager.draw(roomManager, player);
            renderer.resetCamera();
            renderer.drawHud(player, roomManager);

            const movement = camera.follow(player, canvas.width, roomManager.currentRoom.cleared);
            if (movement === 1)  roomManager.advance();
            if (movement === -1) roomManager.retreat();

            requestAnimationFrame(gameLoop);
        }
        requestAnimationFrame(gameLoop);
        document.addEventListener("keydown", (e) => {
            keys[e.keyCode] = true;
        });
        document.addEventListener("keyup", (e) => {
            keys[e.keyCode] = false;
            
        });
        window.addEventListener("resize", () => {
            canvas.width = innerWidth * 0.98;
            canvas.height = innerHeight * 0.96;
        })

    </script>
</body>
</html>
